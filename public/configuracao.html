<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/config.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/5fcf1c6510.js" crossorigin="anonymous"></script>
    <script src="./js/scripts/sessao.js"></script>
</head>


<body>
    <div id="containerGlobal">
        <div class="container" id="container" style="display: none;">
            <div class="cont">
                <p class="titulo">Configurações</p>
                <p class="divisao">Seu perfil</p>
                <div class="imgUserEdit">
                    <img src="assets/userPerfil/semImg.png" id="imgAlterarImg" alt="">
                    <label for="alterarImg" class="botao">Alterar foto de perfil</label>
                    <input type="file" id="alterarImg" accept="image/*" onchange="mostrarPreview()">
                </div>
                <div class="inputs">
                    <div class="inputContainer">
                        <label for="nome_input">Nome</label>
                        <div class="inputBox">
                            <input type="text" id="nome_input" oninput="validar('nome')" value="Eduardo Santana Santos">
                            <i class="fa-regular fa-user"></i>
                        </div>

                        <div class="divValorInvalido" id="invalidoNome"></div>
                    </div>
                    <div class="inputContainer">
                        <label for="nome_input">Nome de usuário</label>
                        <div class="inputBox">
                            <input type="text" id="arroba_input" oninput="validar('arroba')" value="edu.san07">
                            <i class="fa-solid fa-at"></i>
                        </div>

                        <div class="divValorInvalido" id="invalidoArroba"></div>
                    </div>
                    <div class="inputContainer">
                        <label for="nome_input">Email</label>
                        <div class="inputBox">
                            <input type="text" id="email_input" oninput="validar('email')" value="eduardo@gmail.com">
                            <i class="fa-regular fa-envelope"></i>
                        </div>

                        <div class="divValorInvalido" id="invalidoEmail"></div>
                    </div>
                    <div class="inputContainer">
                        <label for="nome_input">Senha atual</label>
                        <div class="inputBox">
                            <input type="password" id="senha_input">
                            <i class="fa-regular fa-eye-slash" onclick="verSenha(senha_input,olho1)" id="olho1" style="cursor: pointer;"></i>
                            
                        </div>
                        <div class="divValorInvalido" id="invalidoSenha"></div>

                    </div>
                    <div class="inputContainer">
                        <label for="nome_input">Nova senha (opcional)</label>
                        <div class="inputBox">
                            <input type="password" id="novaSenha_input" oninput="validar('novaSenha')">
                            <i  class="fa-regular fa-eye-slash" onclick="verSenha(novaSenha_input,olho2)" id="olho2" style="cursor: pointer;"></i>
                        </div>

                        <div id="senhaNivel"></div>
                    </div>
                    <button class="botao" onclick="validar('botao')">Salvar</button>
                </div>
                <p class="divisao">Preferências</p>
                <div class="temaEscolha">
                    <p>Tema</p>
                    <div class="butoesTema">
                        <div>
                            <button  id="bClaro" onclick="mudarTema('claro')"><i class="fa-regular fa-sun"></i></button>
                            <span>Padrão</span>
                        </div>
                        <div>
                            <button onclick="mudarTema('escuro')" id="bEscuro" ><i class="fa-regular fa-moon"></i></button>
                            <span>Dark</span>
                        </div>
                        <div>
                            <button onclick="mudarTema('azul')" id="bAzul" ><i class="fa-solid fa-water"></i></button>
                            <span>Ocean Blue</span>
                        </div>
                        <div>
                            <button onclick="mudarTema('neon')" id="bNeon" ><i class="fa-solid fa-bolt-lightning"></i></button>
                            <span>Neon</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
<script src="./js/componentes/navbar.js"></script>
<script src="./js/api/User.js"></script>
<script src="./js/scripts/config.js"></script>
