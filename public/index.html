<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina inicial</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/posts.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/5fcf1c6510.js" crossorigin="anonymous"></script>
    <script src="./js/scripts/sessao.js"></script>
    <link rel="shortcut icon" href="assets/icon/Simbo.svg" type="image/x-icon">
</head>


<body>
    <div id="containerGlobal">
        <div id="container" style="display: none;">

            <div class="feed" id="feed">
                <div id="novoPostCardContainer"></div>
                <div class="ContainerFiltros" id="filtroDePosts">
                    <select name="" id="ordemPost" class="box" onchange="buscarPost(ordemPost.value,filtroPost.value)">
                        <option value="minutos">Mais recente</option>
                        <option value="curtidas">Mais curtidos</option>
                        <option value="seguidores">Mais seguidores</option>

                    </select>
                    <select name="" id="filtroPost" class="box" onchange="buscarPost(ordemPost.value,filtroPost.value)">
                        <option value="0">Qualquer</option>
                        <option value='curvatura'>Mesma curvatura</option>
                        <option value="seguindo">Seguindo</option>

                    </select>
                </div>
                <div id="feedPost"></div>
            </div>

            <div class="maisPopularesFeed box" id="teste">
                <p>Mais populares</p>
                <div class="listaPopulares" id="listaPopulares">



                </div>

            </div>
        </div>
    </div>

</body>

</html>
<script src="./js/componentes/post.js"></script>
<script src="./js/api/PostAPI.js"></script>
<script src="./js/api/User.js"></script>
<script src="./js/componentes/navbar.js"></script>
<script src="js/scripts/home.js"></script>
