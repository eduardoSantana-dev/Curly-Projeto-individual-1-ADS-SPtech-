<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/cadastro.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/5fcf1c6510.js" crossorigin="anonymous"></script>

</head>


<body>
    <div class="cadastroContainer">
        <div class="imgContainer">
            <img class="logo" src="./assets/icon/nome.svg" alt="">
            <img class="imgcadastro" src="./assets/img/cadastroImg.jpg" alt="">
        </div>
        <form action="" class="">
            <p class="titulo">Nova conta</p>
            <input type="file" id="inserirImagem" style="display: block;">
            <label for="inserirImagem" class="inserirImagemContainer">
                <img src="./assets/img/semImg.png" alt="">
                <i class="fa-solid fa-circle-plus"></i>
            </label>

            <div class="inputs">
                <div class="inputContainer" >
                    <label for="nome_input">Nome</label>
                    <div class="inputBox" >
                        <input type="text" id="nome_input" oninput="validar('nome')" placeholder="Insira seu completo">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div class="divValorInvalido" id="invalidoNome"></div>
                </div>
                <div class="inputContainer">
                    <label for="arroba_input">Nome de usuário</label>
                    <div class="inputBox">
                        <input type="text" id="arroba_input" oninput="validar('arroba')" placeholder="Como deseja ser chamado">
                        <i class="fa-solid fa-at"></i>
                    </div>
                    <div class="divValorInvalido" id="invalidoArroba"></div>
                </div>
                <div class="inputContainer" id="boxEmail">
                    <label for="email_input">E-mail</label>
                    <div class="inputBox">
                        <input type="email" id="email_input" oninput="validar('email')" placeholder="Insira seu email">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <div class="divValorInvalido" id="invalidoEmail"></div>
                </div>
                <div class="inputContainer" id="boxDataNasc">
                    <label for="dataNasc_input">Data de nascimento</label>
                    <div class="inputBox">
                        <input type="date" id="dataNasc_input" oninput="validar('data')" placeholder="Insira sua data de nascimento"
                            style="color: var(--amarelo3);">
                    </div>
                    <div class="divValorInvalido" id="invalidoData"></div>
                </div>

                <div class="inputContainer" id="boxSenha">
                    <label for="senha_input">Senha</label>
                    <div class="inputBox">
                        <input type="password" placeholder="Insira sua senha" oninput="validar('senha')" id="senha_input">
                        <div id="olho"><i class="fa-regular fa-eye-slash" onclick="verSenha()"></i></div>
                    </div>
                    <div id="senhaNivel"></div>
                </div>
                <div class="inputContainer" id="boxConfirmacao">
                    <label for="confirmacao_input">Confirmar senha</label>
                    <div class="inputBox">
                        <input type="password" placeholder="Repita sua senha" id="confirmacao_input" oninput="validar('confirmacao')">
                        <div id="olho2"><i class="fa-regular fa-eye-slash" onclick="verSenhaConfirmacao()"></i></div>
                    </div>
                    <div class="divValorInvalido" id="invalidoCorfimacao"></div>
                </div>
            </div>
            <div class="curvaturasSelect">
                <span>Curvatura do seu cabelo:</span>
                <input type="hidden" id="curvatura_input" value="2A">
                <button type="button" onclick="selecionarCurvatura('2A')" id="2A"
                    class="curvaturasSelectbutton selecionado">2A</button>
                <button type="button" onclick="selecionarCurvatura('2B')" id="2B"
                    class="curvaturasSelectbutton ">2B</button>
                <button type="button" onclick="selecionarCurvatura('2C')" id="2C"
                    class="curvaturasSelectbutton ">2C</button>
                <button type="button" onclick="selecionarCurvatura('3A')" id="3A"
                    class="curvaturasSelectbutton ">3A</button>
                <button type="button" onclick="selecionarCurvatura('3B')" id="3B"
                    class="curvaturasSelectbutton ">3B</button>
                <button type="button" onclick="selecionarCurvatura('3C')" id="3C"
                    class="curvaturasSelectbutton ">3C</button>
                <button type="button" onclick="selecionarCurvatura('4A')" id="4A"
                    class="curvaturasSelectbutton ">4A</button>
                <button type="button" onclick="selecionarCurvatura('4B')" id="4B"
                    class="curvaturasSelectbutton ">4B</button>
                <button type="button" onclick="selecionarCurvatura('4C')" id="4C"
                    class="curvaturasSelectbutton ">4C</button>
            </div>
            <button class="botao" type="button" onclick="validar('botao')">Cadastre-se</button>
            <p>Já tem uma conta?<a href="login.html">Entrar</a></p>
        </form>
    </div>
</body>
<script>
    nome_input.value = "teste"
    arroba_input.value = "testeArroba"
    email_input.value = "email@email.com"
    dataNasc_input.value = '2026-04-23'
    senha_input.value = "senha123"
    confirmacao_input.value= "senha123"
</script>
<script src="./js/scripts/cadastro.js"></script>
<script src="./js/api/User.js"></script>

</html>
