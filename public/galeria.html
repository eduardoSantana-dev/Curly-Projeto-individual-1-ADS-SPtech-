<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/posts.css">
    <link rel="stylesheet" href="./css/galeria.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/5fcf1c6510.js" crossorigin="anonymous"></script>
     <script src="./js/scripts/sessao.js"></script> 
    <link rel="shortcut icon" href="assets/icon/Simbo.svg" type="image/x-icon">
</head>


<body>
    <div id="containerGlobal">
        <div class="container" id="container" style="display: none;">
            <p class="titulo">Galeria</p>
            <div class="selects">
                  <select name="" id="filtroPost" class="box" onchange="chamarGaleria(filtroPost.value,ordemPost.value)">
                        <option value='todos'>Todos</option>
                        <option value='igual'>Mesma curvatura</option>
                        <option value="2">Ondulado(2A,2B,2C)</option>
                        <option value="3">Cacheado(3A,3B,3C)</option>
                        <option value="4">Crespo(4A,4B,4C)</option>
                        <option value="2A">2A</option>
                        <option value="2B">2B</option>
                        <option value="2C">2C</option>
                        <option value="3A">3A</option>
                        <option value="3B">3B</option>
                        <option value="3C">3C</option>
                        <option value="4A">4A</option>
                        <option value="4B">4B</option>
                        <option value="4C">4C</option>
                        
                    </select>
                    <select name=""  id="ordemPost" class="box" onchange="chamarGaleria(filtroPost.value,ordemPost.value)">
                       <option value="minutos">Mais recente</option>
                        <option value="curtidas">Mais curtidos</option>
                        <option value="seguidores">Mais seguidores</option>

                    </select>
            </div>
            <div class="listaImagens" id="listaImagensGaleria">
                    
                    
                    
            </div>
        </div>
    </div>
</body>

</html>
